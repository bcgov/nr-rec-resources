name: Playwright e2e tests

on:
  workflow_call:
    inputs:
      app:
        description: 'The app to run tests on'
        required: true
        type: string
      environment:
        description: 'The GitHub environment to run the tests in'
        required: false
        type: string
      tag:
        description: 'The tag of the containers to run tests on'
        required: true
        type: string
      local:
        description: 'Run locally using docker compose'
        required: false
        type: boolean
        default: false

jobs:
  playwright-e2e:
    # Skip admin e2e when not local — requires a Canadian IP runner or additional secrets
    if: ${{ !(inputs.app == 'admin' && !inputs.local) }}
    name: Playwright e2e
    timeout-minutes: 60
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    steps:
    - uses: actions/checkout@v6
    - name: Run Docker compose
      if: ${{ inputs.local }}
      env:
        BACKEND_IMAGE: ghcr.io/bcgov/nr-rec-resources/${{ inputs.app }}/backend:${{ inputs.tag }}
        FLYWAY_IMAGE: ghcr.io/bcgov/nr-rec-resources/migrations/rst:${{ inputs.tag }}
        FRONTEND_IMAGE: ghcr.io/bcgov/nr-rec-resources/${{ inputs.app }}/frontend:${{ inputs.tag }}
        ADMIN_BACKEND_IMAGE: ghcr.io/bcgov/nr-rec-resources/admin/backend:${{ inputs.tag }}
        ADMIN_FRONTEND_IMAGE: ghcr.io/bcgov/nr-rec-resources/admin/frontend:${{ inputs.tag }}
        FRONTEND_PORT: "${{ inputs.app == 'admin' && '3001' || '3000' }}"
        KEYCLOAK_AUTH_SERVER_URL: ${{ secrets.KEYCLOAK_AUTH_SERVER_URL }}
        KEYCLOAK_REALM: ${{ secrets.KEYCLOAK_REALM }}
        KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
        KEYCLOAK_ISSUER: ${{ secrets.KEYCLOAK_ISSUER }}
        RST_STORAGE_CLOUDFRONT_URL: ${{ secrets.RST_STORAGE_CLOUDFRONT_URL }}
        FOREST_CLIENT_API_URL: ${{ secrets.FOREST_CLIENT_API_URL }}
        FOREST_CLIENT_API_KEY: ${{ secrets.FOREST_CLIENT_API_KEY }}
      run: |
        if [ "${{ inputs.app }}" = "admin" ]; then
          docker compose -f docker-compose.admin.e2e.yml up -d --wait
        else
          docker compose up -d --wait
        fi
      continue-on-error: true
    - name: Dump docker logs for debugging
      if: ${{ inputs.local }}
      uses: jwalton/gh-docker-logs@v2
    - name: Cache Playwright Browsers
      uses: actions/cache@v5
      id: playwright-cache
      with:
        path: |
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
    - name: Fix permissions
      run: sudo chown -R $USER:$USER ${{ inputs.app }}/frontend
    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: '24'
    - run: npm install --@fortawesome:registry=https://npm.fontawesome.com/ --//npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_PRO_TOKEN }}
      working-directory: ./${{ inputs.app }}/frontend
    - run: npx @playwright/test install --with-deps
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      working-directory: ./${{ inputs.app }}/frontend
    - run: npx @playwright/test install-deps
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      working-directory: ./${{ inputs.app }}/frontend
    - name: Run Playwright tests
      run: npx happo-e2e -- npx playwright test
      working-directory: ./${{ inputs.app }}/frontend
      env:
        HAPPO_API_KEY: ${{ secrets.HAPPO_API_KEY }}
        HAPPO_API_SECRET: ${{ secrets.HAPPO_API_SECRET }}
        HAPPO_PROJECT: "${{ inputs.local && secrets.HAPPO_PROJECT_LOCAL || secrets.HAPPO_PROJECT }}"
        # Use 127.0.0.1 explicitly — on Ubuntu 24.04 `localhost` can resolve to
        # ::1 (IPv6), causing "Premature close" errors against IPv4 Docker containers.
        E2E_BASE_URL: "${{
            inputs.local && inputs.app == 'admin' && 'http://127.0.0.1:3001' ||
            inputs.local && inputs.app != 'admin' && 'http://127.0.0.1:3000' ||
            secrets.E2E_BASE_URL
          }}"
        E2E_TARGET: ${{ inputs.local && 'local' || 'deployed' }}
        E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME }}
        E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        E2E_VIEWER_USERNAME: ${{ secrets.E2E_VIEWER_USERNAME }}
        E2E_VIEWER_PASSWORD: ${{ secrets.E2E_VIEWER_PASSWORD }}
    - name: Dump docker logs on failure
      if: failure() && inputs.local
      uses: jwalton/gh-docker-logs@v2
