name: Test shared code
# We may want to add SonarCloud analysis here in the future

on:
  workflow_call:

jobs:
  test-shared:
    name: Run shared tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./shared
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          cache: 'npm'

      - name: Install dependencies
        run:  npm install --@fortawesome:registry=https://npm.fontawesome.com/ --//npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_PRO_TOKEN }}

      - name: Run shared tests
        run: npm run test
